<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contacto - El ancla y la sombra</title>
  <!-- Icono del navegador (favicon) -->
  <link rel="icon" href="img/icono.png" type="image/png">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Fonts: preconnect primero, luego la hoja de estilos -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&display=swap"
    rel="stylesheet">
  <!-- CSS -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark" aria-label="Navegación principal">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html" aria-label="El ancla y la Sombra - Inicio">
          <img src="img/icono.png" alt="Logo El ancla y la Sombra" class="nav-logo d-inline-block align-text-top ms-2">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
          aria-controls="navbarNav" aria-expanded="false" aria-label="Abrir menú de navegación">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
            <li class="nav-item"><a class="nav-link" href="destacados.html">Destacados</a></li>
            <li class="nav-item"><a class="nav-link" href="categorias.html">Categorías</a></li>
            <li class="nav-item"><a class="nav-link active" aria-current="page" href="contacto.html">Contacto</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main>
    <!-- Form-->
    <section aria-labelledby="titulo-contacto" class="container my-5">
      <h2 id="titulo-contacto" class="titulo-principal text-center mb-4">Contacto</h2>

      <form class="bg-dark text-light p-4 rounded shadow" novalidate>
        <div class="mb-3">
          <label for="nombre" class="form-label">Nombre</label>
          <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Tu nombre" required
            autocomplete="name">
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="email" name="email" placeholder="tu@email.com" required
            autocomplete="email">
        </div>
        <div class="mb-3">
          <label for="mensaje" class="form-label">Mensaje</label>
          <textarea class="form-control" id="mensaje" name="mensaje" rows="4" placeholder="Escribe tu mensaje aquí..."
            required></textarea>
        </div>
        <button type="submit" class="btn btn-custom w-100">Enviar</button>
      </form>
    </section>

  </main>

  <!-- FOOTER -->
  <footer>
    <p class="mb-0 text-warning">© 2026 El ancla y la sombra - Todos los derechos reservados</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
